<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Operador - Traxión</title>
    <link rel="stylesheet" href="./style/style-Login.css">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="logo-container">
            <img src="./img/Logo.jpg" alt="Logo Traxión" class="logo-img">
        </div>
        
        <h2 class="text-center margin-b-sm">Acceso al Sistema</h2>
        <p class="text-center margin-b-lg color-gray">Ingresa los datos de tu unidad</p>
        
        <form action="app.html">
            <div class="form-group margin-b-md">
                <label>Número de Camión</label>
                <input type="text" placeholder="Ej. TR-502" required class="input-full">
            </div>
            
            <div class="form-group margin-b-md">
                <label>ID del Operador</label>
                <input type="password" placeholder="••••••••" required class="input-full">
            </div>
            
            <div class="form-group margin-b-lg">
                <label>Ruta Asignada</label>
                <select class="input-full">
                    <option>México - Querétaro (Corredor Central)</option>
                    <option>Querétaro - San Luis Potosí</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Iniciar</button>
            <div class="text-center margin-t-md">
                <a href="index.html" class="btn-back">← Volver al inicio</a>
            </div>
        </form>
    </div>
</body>
</html>
